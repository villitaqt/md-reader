<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Reader</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <button id="btn-open-file">Abrir archivo</button>
        <button id="btn-open-folder">Abrir carpeta</button>
        <span class="toolbar-spacer"></span>
        <div id="mode-toggle" class="hidden">
          <button class="mode-btn mode-btn--active" data-mode="view">Vista</button>
          <button class="mode-btn" data-mode="edit">Editar</button>
        </div>
        <button id="btn-find" title="Buscar (Ctrl+F)">&#x2315;</button>
      </header>
      <div id="layout">
        <nav id="sidebar" class="hidden">
          <ul id="tree"></ul>
        </nav>
        <div id="viewer">
          <article id="content">
            <p class="placeholder">Abre un archivo .md para comenzar.</p>
          </article>
          <textarea id="editor" class="hidden" spellcheck="false"></textarea>
        </div>
      </div>
    </div>
  </body>
</html>
